<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClassicTube Global | Sharp Monochrome</title>
    <style>
        /* 2006 SHARP DESIGN PHILOSOPHY */
        body {
            background-color: #ffffff;
            color: #000000;
            font-family: Arial, Helvetica, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            border: 20px solid #000; /* Keskin siyah çerçeve */
            box-sizing: border-box;
            text-align: center;
        }

        .container { padding: 20px; }

        /* LOGO AREA */
        .logo-box {
            background: #000;
            width: 80px;
            height: 80px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 25px;
        }
        .play-triangle {
            width: 0; height: 0;
            border-top: 20px solid transparent;
            border-bottom: 20px solid transparent;
            border-left: 30px solid #fff;
            margin-left: 5px;
        }

        h1 { 
            font-size: 3.5rem; 
            font-weight: 900; 
            margin: 0; 
            letter-spacing: -3px; 
            text-transform: uppercase;
        }
        
        p { 
            font-size: 1.1rem; 
            margin: 15px 0 40px; 
            font-weight: bold; 
            letter-spacing: 2px;
            text-transform: uppercase;
            border-top: 2px solid #000;
            border-bottom: 2px solid #000;
            padding: 5px 0;
        }

        /* BUTTONS (SQUARE & SHARP) */
        .btn {
            display: inline-block;
            background: #000;
            color: #fff;
            padding: 18px 45px;
            text-decoration: none;
            font-weight: 900;
            border: 3px solid #000;
            margin: 10px;
            transition: 0.15s;
            font-size: 1rem;
        }
        .btn:hover { 
            background: #fff; 
            color: #000; 
        }

        .btn-outline { 
            background: #fff; 
            color: #000; 
        }
        .btn-outline:hover { 
            background: #000; 
            color: #fff; 
        }

        footer { 
            position: absolute;
            bottom: 40px;
            font-size: 11px; 
            font-weight: 900; 
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-box">
            <div class="play-triangle"></div>
        </div>
        <h1>ClassicTube.io</h1>
        <p>Sharp • Monochrome • Global 2006</p>
        
        <div class="actions">
            <a href="#" class="btn">INSTALL EXTENSION</a>
            <a href="#" class="btn btn-outline">SUPPORT PROJECT</a>
        </div>
    </div>

    <footer>
        © 2026 CLASSICTUBE GLOBAL - AUTHENTIC RECONSTRUCTION
    </footer>

</body>
</html>
